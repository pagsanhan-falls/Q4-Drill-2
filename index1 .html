<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Seatwork 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>

<style>

    body {
    background-image: url(Avdol.jpg);
    background-size: cover;
    background-repeat: no-repeat;
    
    table, th, td {
    border: 1px solid black;
    }
    
</style>

<body>

<div class="container p-3 bg-light bg-opacity-50 text-dark text-center rounded">     
    
    <h2 class="form-title">HEAT INDEX</h2>
   
    <details class="ontoggle">
        <summary>Intructions</summary>
        <p id="instruct"></p>
    </details


</div>

    <button class="btn btn-info" onclick="TeamRank()">Rank</button>
    
    <script>
        function TeamRank(){
            var rank = "1st";
            var message = "";
            
            switch(true){
                case (rank === "1st"):
                    message = "Champions!";
                    break;
                    
                case (rank === "2nd"):
                    message = "Second Placer!";
                    break;
                    
                case (rank === "3rd"):
                    message = "Third Placer!";
                    break;
                    
                case (rank === "4th"):
                    message = "Fourth Placer!";
                    break;
                    
                default:
                    message = "Rank could not be determined.";
                    
        }
            alert(message);
    }
    
    document.getElementById('instruct').innerHTML = "";

    </script>
</body>
</html>
