<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Seatwork 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>

<style>

    body {
    background-image: url(Avdol.jpg);
    background-size: cover;
    background-repeat: no-repeat;
    }
    
    *{
        text-align: left;
    }
    
    input{
        display: block;
        margin-left: 0;
    }
    
    div{
        height: 100vh;
    }
    
</style>

<body>

<div class="container-sm ms-3 p-3 bg-light bg-opacity-50 text-dark border rounded" style="width: fit-content;">     
    
    <h1 class="form-title">HEAT INDEX</h1>
   
    <details class="ontoggle">
        <summary>Intructions</summary>
        <p id="instruct"></p>
    </details>
    
    <br><br>

    <h2>Degree in °C</h2>
    <input type="number" id="heat" name="quantity" placeholder="Input degree value">
    
    <br>
    
    <h2>Humidity in %</h2>
    <input type="number" id="humidity" name="quantity" placeholder="Input percentage value">
    
    <br>

    <button onclick="Calculate()">Check</button>

</div>

    <script>
    
    document.getElementById("instruct").innerHTML =
"Enter temperature and humidity, then click the button.";

function Calculate() {

    heat= Number(document.getElementById("heat").value);
    humidity= Number(document.getElementById("humidity").value);

    if (isNaN(heat) || isNaN(humidity)) {
        alert("Please enter valid numbers.");
        return;
    }

    HeatIndex= heat+(0.33*humidity) -4;

    status= "";

    if (HeatIndex <= 27) {
        alert = "Comfortable / Cool";
    } else if (HeatIndex <= 32) {
        alert = "Warm";
    } else if (HeatIndex <= 37) {
        alert = "Hot";
    } else if (HeatIndex <= 41) {
        alert = "Very Hot";
    } else if (HeatIndex <= 42) {
        alert = "Extreme Heat";
    }

   alert("Heat Index: " + HeatIndex.toFixed(2) + "°C\nStatus: " + status);
}


    </script>
</body>
</html>
